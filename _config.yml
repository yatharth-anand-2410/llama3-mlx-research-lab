title: "LLM Deep-Dive Laboratory"
description: "Deconstructing Llama 3: From Local Inference to Mechanistic Interpretability and Weight Surgery."
baseurl: "/llama3-mlx-research-lab" # IMPORTANT: No trailing slash
url: "https://yatharth-anand-2410.github.io"

# Owner Information
author:
  name: "Yatharth Anand"
  email: "yatharthanand2410@gmail.com"
  twitter_username: "yatharth_anand"
  github_username: "yatharth-anand-2410"

# Build Settings
remote_theme: jekyll/minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-include-cache

# Custom Settings
header_pages:
  - index.md

# Minima Settings
minima:
  social_links:
    - { platform: github, user_url: "https://github.com/yatharth-anand-2410/llama3-mlx-research-lab" }

# Markdown Processing
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Force the inclusion of notebooks folder
include:
  - notebooks

# Exclude from processing
exclude:
  - .venv
  - .github
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
  - pyproject.toml
  - requirements.txt
  - Makefile
