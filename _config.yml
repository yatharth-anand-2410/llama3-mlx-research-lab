# Llama 3 MLX Research Lab - Project Configuration

# This repository is now a dedicated research lab for LLM experiments.
# The blog has been centralized to: https://yatharth-anand-2410.github.io

title: "Llama 3 MLX Research Lab"
description: "Deconstructing Llama 3: From Local Inference to Mechanistic Interpretability and Weight Surgery."

# Force the inclusion of notebooks folder for documentation purposes
include:
  - notebooks

# Exclude from processing if using Jekyll (for backwards compatibility or simple hosting)
exclude:
  - .venv
  - .github
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - pyproject.toml
  - requirements.txt
